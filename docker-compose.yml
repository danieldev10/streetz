services:
  postgres:
    image: postgres:16-alpine
    container_name: streetz-postgres
    environment:
      POSTGRES_DB: streetz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - streetz-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d streetz"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: streetz-redis
    ports:
      - "6379:6379"
    volumes:
      - streetz-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  streetz-postgres-data:
  streetz-redis-data:
